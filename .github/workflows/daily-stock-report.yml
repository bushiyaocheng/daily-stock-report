name: Daily Tech Stock Report

on:
  schedule:
    # 09:07 Asia/Hong_Kong = 01:07 UTC.
    - cron: "7 1 * * *"
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log schedule diagnostics
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "event_schedule=${{ github.event.schedule }}"
          echo "run_id=${{ github.run_id }}"
          echo "run_attempt=${{ github.run_attempt }}"
          echo "workflow_sha=${{ github.sha }}"
          echo "utc_now=$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "hkt_now=$(TZ=Asia/Hong_Kong date '+%Y-%m-%d %H:%M:%S HKT')"
          echo "expected_schedule=01:07 UTC / 09:07 HKT"
          {
            echo "### Schedule diagnostics"
            echo "- event: ${{ github.event_name }}"
            echo "- schedule: ${{ github.event.schedule }}"
            echo "- UTC now: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "- HKT now: $(TZ=Asia/Hong_Kong date '+%Y-%m-%d %H:%M:%S HKT')"
            echo "- expected: 01:07 UTC / 09:07 HKT"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate report
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
          REPORT_OUTPUT_DIR: reports
        run: python stock_report_cloud.py

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-tech-stock-report
          path: reports/*.md
